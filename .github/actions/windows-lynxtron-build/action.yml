name: build windows lynxtron

description: build windows lynxtron apk.

inputs:
  build-arch:
    description: The architecture of lynxtron we are building. It could be x64,x86
    required: true
runs:
  using: composite
  steps:
    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Setup Node.js 22.18.0
      uses: actions/setup-node@v6
      with:
        node-version: '22.18.0'
    - name: Install Common Dependencies
      uses: ./lynxtron/.github/actions/common-deps
      with:
        run-habitat-sync: 'false'
    - name: Prepare environment
      shell: pwsh
      run: |
        cd ${{ github.workspace }}/lynxtron
        git config --global user.name 'Lynxtron Scripts'
        git config --global user.email 'scripts@lynxtron.com'
        lynxtron_tools/envsetup.ps1
        python lynxtron_tools/prepare_build_env.py
    - name: Build Lynxtron
      shell: pwsh
      run: |-
        $cmakeVersion = "3.30.5"
        $cmakeUrl = "https://github.com/Kitware/CMake/releases/download/v$cmakeVersion/cmake-$cmakeVersion-windows-x86_64.zip"
        $cmakeZip = "$env:TEMP\cmake.zip"
        $cmakeDir = "C:\cmake"
        Write-Host "Downloading CMake $cmakeVersion..."
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $cmakeUrl -OutFile $cmakeZip -UseBasicParsing
        Write-Host "Extracting CMake..."
        Expand-Archive -Path $cmakeZip -DestinationPath "C:\" -Force
        Rename-Item -Path "C:\cmake-$cmakeVersion-windows-x86_64" -NewName "cmake" -Force
        $cmakeBin = Join-Path $cmakeDir "bin"
        $env:PATH = "$cmakeBin;$env:PATH"
        Write-Host "CMake installed to $cmakeBin"
        cmake --version
        $env:vs2022_install = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = 0
        $env:GYP_MSVS_OVERRIDE_PATH = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
        $env:WINDOWSSDKDIR = "${env:ProgramFiles(x86)}\Windows Kits\10"
        cd ${{ github.workspace }}/lynxtron
        .\lynxtron_tools\envsetup.ps1
        $env:PATH = "$pwd\buildtools\gn;$pwd\buildtools\ninja;$env:PATH"
        python lynxtron_tools\gn\gn.py --windows-cpu ${{ inputs.build-arch }}
        buildtools\ninja\ninja.exe -C out\Release lynxtron_app
        $buildflags = Get-Content out\Release\gen\base\allocator\partition_allocator\src\partition_alloc\buildflags.h -Raw
        if ($buildflags -notmatch 'USE_PARTITION_ALLOC_AS_MALLOC\(\) \(0\)') { throw 'USE_PARTITION_ALLOC_AS_MALLOC must be disabled for Lynxtron release builds' }
        if ($buildflags -notmatch 'ENABLE_BACKUP_REF_PTR_SUPPORT\(\) \(0\)') { throw 'ENABLE_BACKUP_REF_PTR_SUPPORT must be disabled when PartitionAlloc is not process-wide malloc' }
