productName: Lynxtron shell demo
appId: com.lynxtron.shelldemo
directories:
  buildResources: resources
  output: dist
  app: dist/desktop
files:
  - index.js
  - '**/*.lynx.bundle'
  - '**/*.js'
  - '**/*.css'
  - '**/*.html'
  - '**/*.json'
  - '**/*.jsn'
  - '**/*.png'
  - '**/*.exe'
asar: true
asarUnpack:
  - statics/
npmRebuild: false
extraResources:
  - from: src/assets
    to: assets
  - from: dist/desktop
    to: resources/app
icon: lynxtron.png
electronBranding:
  projectName: lynxtron
  productName: Lynxtron
mac:
  artifactName: LynxtronShellDemo-v${version}-darwin-${arch}.${ext}
  extendInfo:
    CFBundleURLSchemes:
      - LynxtronShellDemo
  identity: null
win:
  target:
    - target: nsis
      arch: x64
  artifactName: LynxtronShellDemo-v${version}-win-x64.${ext}
nsis:
  artifactName: LynxtronShellDemo-v${version}-win-x64-Setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
