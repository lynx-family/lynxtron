productName: lynxtron
appId: com.lynxtron.shelldemo
directories:
  buildResources: resources
  output: dist
  app: dist/desktop
files:
  - index.js
  - '**/*.lynx.bundle'
  - '**/*.js'
  - '**/*.css'
  - '**/*.html'
  - '**/*.json'
  - '**/*.jsn'
  - '**/*.png'
  - '**/*.exe'
asar: true
asarUnpack:
  - statics/
npmRebuild: false
extraResources:
  - from: src/assets
    to: assets
icon: lynxtron.png
electronBranding:
  projectName: lynxtron
  productName: Lynxtron
mac:
  artifactName: LynxtronShellDemo-v${version}-darwin-${arch}.${ext}
  extendInfo:
    CFBundleURLSchemes:
      - LynxtronShellDemo
  identity: null
